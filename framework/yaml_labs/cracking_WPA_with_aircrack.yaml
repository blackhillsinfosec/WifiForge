lab_name: cracking_wpa_with_aircrack
description: >
  This lab covers the use of Aircrack-ng to crack WPA/WPA2 handshakes by applying dictionary or brute-force attacks captured authentication data.

stations:
  - name: Attacker
    wlans: 1
  - name: host1
    passwd: 123456789a
    encrypt: wep
  - name: host2
    passwd: 123456789a
    encrypt: wep
  - name: host1_wpa
    passwd: december2022
    encrypt: wpa2
  - name: host2_wpa
    passwd: december2022
    encrypt: wpa2
  - name: host5
    passwd: password
    encrypt: wpa2
  - name: host6
    passwd: password
    encrypt: wpa2
  - name: host7
    passwd: password
    encrypt: wpa2
  - name: host8
    passwd: supersecurepassword
    encrypt: wpa2
  - name: host9
    passwd: iamhidden
    encrypt: wpa2

access_points:
  - name: ap0
    ssid: WEP_NETWORK
    passwd: 123456789a
    encrypt: wep
    mode: g
    channel: 1
    failMode: standalone
    datapath: user
  - name: ap1
    ssid: WPA2_NETWORK
    passwd: december2022
    encrypt: wpa2
    mode: g
    channel: 6
  - name: ap2
    ssid: Harlow_Home_Wifi
    passwd: password
    encrypt: wpa2
    mode: g
    channel: 11
  - name: ap3
    ssid: FBI_VAN
    passwd: supersecurepassword
    encrypt: wpa2
    mode: g
    channel: 1
  - name: ap4
    ssid: cantseeme
    passwd: iamhidden
    encrypt: wpa2
    mode: g
    channel: 11

links:
  - endpoints: [host1, ap0]
  - endpoints: [host2, ap0]
  - endpoints: [host1_wpa, ap1]
  - endpoints: [host2_wpa, ap1]
  - endpoints: [host5, ap2]
  - endpoints: [host6, ap2]
  - endpoints: [host7, ap2]
  - endpoints: [host8, ap3]
  - endpoints: [host9, ap4]

tmux_targets:
  - Attacker

tmux_session_name: WPA_CRACK

cleanup:
  - clear
